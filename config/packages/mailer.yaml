framework:
    mailer:
        dsn: '%env(MAILER_DSN)%'
        envelope:
            sender: '%env(default:default_mailer_from:MAILER_FROM_ADDRESS)%'

when@dev:
    framework:
        mailer:
            dsn: 'smtp://%env(urlencode:BREVO_SMTP_USER)%:%env(urlencode:BREVO_SMTP_KEY)%@smtp-relay.brevo.com:587'

when@prod:
    framework:
        mailer:
            dsn: 'brevo+api://%env(BREVO_API_KEY)%@default'
