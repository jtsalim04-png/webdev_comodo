services:
  mysql:
    image: mysql:8.0
    container_name: comodobookingnew-mysql-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Comodo_Root_pass
      MYSQL_DATABASE: ComodoDBNew
      MYSQL_USER: Comodo_user
      MYSQL_PASSWORD: Comodo123
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - comodobookingnew

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: comodobookingnew-phpmyadmin-1
    restart: always
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"
    networks:
      - comodobookingnew

networks:
  comodobookingnew:

volumes:
  db_data:
