name: comodowebsite

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPS: 1
    container_name: comodowebsite-app
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8080"
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DEFAULT_URI: ${APP_URL}
      PORT: 8080
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?serverVersion=8.0.32&charset=utf8mb4
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    volumes:
      - ./.env:/app/.env:ro
      - ./config:/app/config
      - ./src:/app/src
      - ./templates:/app/templates
      - ./public:/app/public
      - ./assets:/app/assets
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mysql
    networks:
      - comodobookingnew

  mysql:
    image: mysql:8.0
    container_name: comodobookingnew-mysql-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - comodobookingnew

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: comodobookingnew-phpmyadmin-1
    restart: always
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "${PMA_PORT}:80"
    networks:
      - comodobookingnew

networks:
  comodobookingnew:

volumes:
  db_data:
