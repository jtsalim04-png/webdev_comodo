server {
    listen 8080 default_server;
    server_name _;
    root /app/public;
    index index.php;
    
    # Logs for debugging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Serve static assets directly (compiled by AssetMapper)
    location ~* \.(?:css|js|map|jpe?g|jpg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }
    
    # Serve AssetMapper public directory
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }
    
    # Serve importmap files if they exist
    location ^~ /importmap/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }
    
    # Main Symfony routing
    location / {
        try_files $uri /index.php$is_args$args;
    }
    
    # Process PHP files
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Symfony specific parameters
        fastcgi_param APP_ENV prod;
        fastcgi_param APP_DEBUG 0;
        
        # Handle proxy headers (Railway)
        fastcgi_param HTTPS $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        
        # Hide PHP headers
        fastcgi_hide_header X-Powered-By;
        
        # Increase timeouts for Symfony
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        
        internal;
    }
    
    # Block direct access to PHP files except index.php
    location ~ \.php$ {
        return 404;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
    
    # Deny access to sensitive directories
    location ~ ^/(config|templates|src|bin|var|vendor)/ {
        deny all;
        return 404;
    }
    
    # Status endpoint for Railway health checks
    location /health.html {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
        add_header Cache-Control no-cache;
    }
}